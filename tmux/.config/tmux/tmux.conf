# ==============================================================================
# 0. CORE SETTINGS (Tối ưu hiệu năng)
# ==============================================================================

# Đổi Prefix key từ Ctrl+b sang Ctrl+Space (Dễ bấm hơn)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Tắt độ trễ của phím ESC (Cực kỳ quan trọng cho Neovim)
set -s escape-time 0

# Tăng giới hạn lịch sử cuộn màn hình
set -g history-limit 50000

# Hỗ trợ hiển thị màu TrueColor (24-bit) cho Neovim
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Bật chuột để cuộn và thay đổi kích thước pane nhanh
set -g mouse on

# Tự động đánh số lại các cửa sổ khi đóng một cửa sổ ở giữa
set -g renumber-windows on

# ==============================================================================
# 1. NAVIGATION & PANES (Vim-like bindings)
# ==============================================================================

# Đánh số window và pane bắt đầu từ 1 (Phím 0 nằm quá xa)
set -g base-index 1
setw -g pane-base-index 1

# Tạo Session nhanh: Prefix + S
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"

# Chia màn hình trực quan hơn bằng | và - (Mở ngay tại thư mục hiện tại)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Di chuyển giữa các Pane bằng h, j, k, l (Giống Vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize Pane nhanh bằng Shift + h, j, k, l
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload cấu hình nhanh bằng phím r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config Reloaded!"

# ==============================================================================
# 2. COPY MODE (Vi-mode chuẩn chỉ & Đa tương thích Clipboard)
# ==============================================================================

# Sử dụng phím tắt vi trong chế độ copy (Phím [)
set-window-option -g mode-keys vi

# Gán phím v để bắt đầu chọn vùng (Giống Vim)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Copy thông minh: Tự nhận diện Wayland (wl-copy) hoặc X11 (xclip)
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "if command -v wl-copy >/dev/null 2>&1; then wl-copy; else xclip -selection clipboard -i; fi"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "if command -v wl-copy >/dev/null 2>&1; then wl-copy; else xclip -selection clipboard -i; fi"

# ==============================================================================
# 3. UI / AESTHETICS (Tối giản - Tiết kiệm tài nguyên)
# ==============================================================================

# Đưa thanh trạng thái xuống dưới cùng
set-option -g status-position bottom 

# Màu sắc nền nã, tinh tế (Sử dụng màu nền mặc định của Terminal)
set -g status-style bg=default,fg=white
set -g status-justify left
set -g status-left-length 50

# Hiển thị Session Name và trạng thái Command Mode
set -g status-left "#{?client_prefix,#[bg=yellow]#[fg=black]#[bold] 🚀 COMMAND #[bg=default]#[fg=default] ,#[fg=blue,bold] ❐ #S }#[fg=white,nobold]| "
set -g status-right "#[fg=cyan] %H:%M "

# Định dạng các Window không hoạt động (Màu xám dịu)
set -g window-status-format "#[fg=gray]#I:#W "

# Định dạng Window đang hoạt động (Màu trắng sáng, in đậm)
set -g window-status-current-format "#[fg=white,bold]#I:#W "

# Viền của Pane đang hoạt động (Dễ nhận diện tiêu điểm)
set -g pane-active-border-style fg=blue
