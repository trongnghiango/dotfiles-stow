<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Font substitutions based on your setup -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Noto Sans</family>
      <family>Liberation Sans</family>
      <family>Libertinus Sans</family>
    </prefer>
  </alias>
  
  <alias>
    <family>serif</family>
    <prefer>
      <family>DejaVu Serif</family>
      <family>Noto Serif</family>
      <family>Liberation Serif</family>
      <family>Libertinus Serif</family>
    </prefer>
  </alias>
  
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>
      <family>JetBrains Mono Nerd Font</family>
      <family>Liberation Mono</family>
    </prefer>
  </alias>

  <!-- Specific font settings -->
  <match target="font">
    <!-- Match your GTK settings -->
    <test name="family" compare="contains">
      <string>DejaVu</string>
    </test>
    <edit name="hintstyle" mode="assign"><const>hintmedium</const></edit>
  </match>
</fontconfig>
